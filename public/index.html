<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF 4P 변환기</title>
    <meta
      name="description"
      content="PDF를 업로드하면 4P 굿노트 스타일 노트 PDF로 변환해서 바로 다운로드합니다."
    />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <p class="eyebrow">PDF TO NOTE</p>
        <h1>슬라이드를 업로드하면<br />필기용 4P PDF로 변환합니다.</h1>
        <p class="hero-copy">
          드래그 앤 드롭 또는 파일 선택으로 PDF를 올리면, 왼쪽에는 슬라이드 2장,
          오른쪽에는 모눈 영역이 있는 다운로드용 PDF를 생성합니다.
        </p>
      </header>

      <main class="content-grid">
        <section class="upload-card">
          <form id="upload-form" class="upload-form">
            <label id="dropzone" class="dropzone" for="file-input">
              <input id="file-input" name="file" type="file" accept="application/pdf,.pdf" hidden />
              <span class="dropzone-kicker">DROP OR SELECT</span>
              <strong>PDF 파일 업로드</strong>
              <span id="file-name" class="file-name">선택된 파일이 없습니다.</span>
            </label>

            <button id="submit-button" type="submit" class="submit-button">
              변환 후 다운로드
            </button>
          </form>

          <div id="status" class="status" aria-live="polite"></div>
          <div id="result-actions" class="result-actions" hidden>
            <a id="open-result-link" class="result-link" href="#">변환된 PDF 다운로드</a>
          </div>
        </section>

        <aside class="info-panel">
          <div class="info-block">
            <span class="info-label">OUTPUT</span>
            <p>1440x1080 비율의 4P 필기용 PDF</p>
          </div>
          <div class="info-block">
            <span class="info-label">FLOW</span>
            <p>업로드 → 서버 변환 → 즉시 다운로드</p>
          </div>
          <div class="info-block">
            <span class="info-label">LIMIT</span>
            <p>PDF만 업로드 가능, 최대 40MB</p>
          </div>
        </aside>
      </main>
    </div>

    <script src="/app.js" defer></script>
  </body>
</html>
